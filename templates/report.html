<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellness Report - Energeiaa</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌿 Energeiaa</h1>
            <p>Your Personal Wellness Report</p>
        </header>

        <div id="report">
            <!-- Score -->
            <div class="score-card">
                <div class="score-circle" id="scoreCircle">
                    <span id="scoreValue">--</span>
                    <small>Wellness Score</small>
                </div>
                <div class="score-label" id="scoreLabel">Analyzing...</div>
            </div>

            <!-- Profile Summary -->
            <div class="section">
                <h2>👤 Profile Summary</h2>
                <p id="profileSummary" class="summary-text"></p>
            </div>

            <!-- Key Observations -->
            <div class="section">
                <h2>🔍 Key Observations</h2>
                <ul id="keyObservations" class="list"></ul>
            </div>

            <!-- Interpretations -->
            <div class="section">
                <h2>📖 What This Means For You</h2>
                <ul id="interpretations" class="list"></ul>
            </div>

            <!-- Risk Indicators -->
            <div class="section">
                <h2>⚠️ Risk Indicators</h2>
                <div id="riskIndicators"></div>
            </div>

            <!-- Wellness Insights -->
            <div class="section">
                <h2>💡 Wellness Insights</h2>
                <ul id="wellnessInsights" class="list"></ul>
            </div>

            <!-- Recommendations -->
            <div class="section">
                <h2>✅ Recommendations</h2>
                <ul id="recommendations" class="list"></ul>
            </div>

            <!-- Lifestyle Suggestions -->
            <div class="section">
                <h2>🌱 Lifestyle Suggestions</h2>
                <div id="lifestyleSuggestions" class="lifestyle-grid"></div>
            </div>

            <div class="actions">
                <button onclick="window.location.href='/'">🔄 New Report</button>
                <button onclick="window.print()">🖨️ Print Report</button>
            </div>
        </div>
    </div>

    <script>
        const report = JSON.parse(localStorage.getItem("wellnessReport"));

        if (!report) {
            window.location.href = "/";
        }

        // Score
        const score = report.wellness_score;
        document.getElementById("scoreValue").textContent = score;
        const circle = document.getElementById("scoreCircle");
        const label = document.getElementById("scoreLabel");

        if (score >= 75) {
            circle.style.borderColor = "#22c55e";
            label.textContent = "🟢 Great Health";
            label.style.color = "#22c55e";
        } else if (score >= 50) {
            circle.style.borderColor = "#f59e0b";
            label.textContent = "🟡 Fair Health";
            label.style.color = "#f59e0b";
        } else {
            circle.style.borderColor = "#ef4444";
            label.textContent = "🔴 Needs Attention";
            label.style.color = "#ef4444";
        }

        // Profile
        document.getElementById("profileSummary").textContent = report.profile_summary;

        // Key Observations
        const obs = document.getElementById("keyObservations");
        report.key_observations.forEach(o => {
            const li = document.createElement("li");
            li.textContent = o;
            obs.appendChild(li);
        });

        // Interpretations
        const interp = document.getElementById("interpretations");
        report.interpretations.forEach(i => {
            const li = document.createElement("li");
            li.textContent = i;
            interp.appendChild(li);
        });

        // Risk Indicators
        const risks = document.getElementById("riskIndicators");
        report.risk_indicators.forEach(r => {
            const colors = { "Low": "#22c55e", "Moderate": "#f59e0b", "High": "#ef4444" };
            const div = document.createElement("div");
            div.className = "risk-card";
            div.innerHTML = `
                <div class="risk-header">
                    <span class="risk-name">${r.name}</span>
                    <span class="risk-badge" style="background:${colors[r.level]}">${r.level}</span>
                </div>
                <p class="risk-explanation">${r.explanation}</p>
            `;
            risks.appendChild(div);
        });

        // Wellness Insights
        const insights = document.getElementById("wellnessInsights");
        report.wellness_insights.forEach(i => {
            const li = document.createElement("li");
            li.textContent = i;
            insights.appendChild(li);
        });

        // Recommendations
        const recs = document.getElementById("recommendations");
        report.recommendations.forEach(r => {
            const li = document.createElement("li");
            li.textContent = r;
            recs.appendChild(li);
        });

        // Lifestyle
        const lifestyle = document.getElementById("lifestyleSuggestions");
        report.lifestyle_suggestions.forEach(s => {
            const div = document.createElement("div");
            div.className = "lifestyle-card";
            div.textContent = s;
            lifestyle.appendChild(div);
        });
    </script>
</body>
</html>
